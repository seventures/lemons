<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">seventure</title>
  <link rel="icon" id="favicon" href="assets/favicon.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Splash -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <p class="splash-text">Welcome!<br>ようこそ！<br>환영!<br>欢迎！</p>
    </div>
  </div>

  <!-- Main profile -->
  <div id="main" class="main hidden">
    <div class="bg-blur" id="bg-blur"></div>
    <div class="particles" id="particles"></div>

    <div class="card">
      <div class="avatar-wrap">
        <img class="avatar" id="avatar" src="assets/avatar.png" alt="avatar"
             onerror="this.src='https://api.dicebear.com/7.x/thumbs/svg?seed=seventure'" />
        <div class="avatar-ring"></div>
      </div>

      <h1 class="username" id="username">seventure</h1>
      <p class="uid" id="uid">UID 001</p>
      <p class="bio" id="bio">Hello! | こんにちは！ | 안녕하세요! | 你好！</p>

      <div class="badges" id="badges"></div>
      <div class="socials" id="socials"></div>

      <!-- Profile views - off by default -->
      <!-- <div class="views"> -->
      <!--  <i class="fas fa-eye"></i> -->
      <!--  <span id="view-count">0</span>&nbsp;Profile Views -->
      <!--</div> -->
    </div>

    <p class="footer">Make your own &mdash; <a href="https://github.com/seventures/lemons">GitHub</a></p>
  </div>

  <div class="music" id="music">
    <div class="music-art">
      <img id="music-cover" src="" alt="" />
    </div>
    <div class="music-body">
      <div class="music-title" id="music-title">My Ordinary Life</div>
      <div class="music-artist" id="music-artist">The Living Tombstone</div>
      <div class="music-progress-wrap">
        <input type="range" class="music-progress" id="music-progress" value="0" min="0" max="100" step="0.1" />
        <div class="music-time">
          <span id="music-current">0:00</span>
          <span id="music-duration">0:00</span>
        </div>
      </div>
      <div class="music-controls">
        <button class="music-btn" id="music-prev" title="Restart"><i class="fas fa-backward-step"></i></button>
        <button class="music-btn music-play-btn" id="music-play" title="Play"><i class="fas fa-play"></i></button>
        <button class="music-btn" id="music-next" title="Skip"><i class="fas fa-forward-step"></i></button>
      </div>
    </div>
  </div>

  <div class="volume-wrap" id="volume-wrap">
    <i class="fas fa-volume-high" id="volume-icon"></i>
    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="0.5" />
  </div>

  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
